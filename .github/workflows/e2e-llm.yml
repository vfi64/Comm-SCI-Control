name: Optional LLM E2E

on:
  workflow_dispatch:

jobs:
  llm-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate fixtures
        run: python3 scripts/generate_fixtures.py

      - name: Run live LLM E2E tests (optional)
        env:
          CSC_E2E_API_KEY: ${{ secrets.CSC_E2E_API_KEY }}
        run: |
          if [ -z "${CSC_E2E_API_KEY:-}" ]; then
            echo "CSC_E2E_API_KEY is not configured. Skipping live LLM E2E run."
            exit 0
          fi
          export CSC_E2E_ENABLE="1"
          bash scripts/run_e2e_llm_tests.sh
